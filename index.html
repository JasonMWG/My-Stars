<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Particle Universe - Ghost v2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        /* 核心修改：将所有基础透明度降至 0.2 (20%) */
        :root { 
            --ui-bg: rgba(60, 60, 70, 0.2); 
            --text-color: rgba(255, 255, 255, 0.2); 
            --accent: #00f2ff; 
            --blur: blur(15px); /* 略微增加模糊度，保证极低透明度下的可读性 */
        }
        
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; color: white; -webkit-user-select: none; }
        #container { position: fixed; inset: 0; z-index: 1; }

        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #121225, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        #start-btn { 
            padding: 18px 45px; font-size: 20px; background: var(--accent); border: none; border-radius: 40px; 
            color: #000; font-weight: bold; box-shadow: 0 0 40px rgba(0,242,255,0.4);
        }

        /* 底部聚合面板 */
        #footer-dock {
            position: fixed; bottom: 35px; left: 15px; right: 15px;
            display: flex; align-items: flex-end; gap: 12px; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 摄像头小窗 (20% 透明度边框) */
        #camera-preview {
            width: 90px; height: 90px; 
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            overflow: hidden; transform: scaleX(-1); flex-shrink: 0;
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            opacity: 0.4; /* 降低整体感官存在感 */
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; }

        #control-cluster { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }

        /* 按钮行 */
        #preset-row { display: flex; gap: 6px; height: 42px; }
        .btn-mini { 
            flex: 1; background: var(--ui-bg); border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 10px; 
            color: var(--text-color); 
            transition: all 0.3s ease;
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
        }
        .btn-mini i { margin-right: 3px; font-style: normal; font-size: 13px; opacity: 0.5; }
        
        /* 点击时激活状态：瞬间变亮 */
        .btn-mini:active { 
            background: rgba(255,255,255,0.2); 
            color: rgba(255,255,255,0.9); 
            border-color: var(--accent);
            transform: scale(0.96); 
        }

        /* 滑块行 */
        #slider-row {
            height: 42px; background: var(--ui-bg); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 21px; display: flex; align-items: center; gap: 10px; padding: 0 15px;
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            color: var(--text-color);
            font-size: 10px;
        }
        #densitySlider { flex-grow: 1; accent-color: var(--accent); opacity: 0.3; }
        #baseColor { width: 22px; height: 22px; border: none; background: none; flex-shrink: 0; opacity: 0.4; }

        input[type="range"] { height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.05); border-radius: 2px; }
    </style>
</head>
<body>

<div id="overlay">
    <button id="start-btn">开启宇宙航行</button>
</div>

<div id="container"></div>

<div id="footer-dock">
    <div id="camera-preview">
        <video id="webcam" playsinline muted></video>
    </div>

    <div id="control-cluster">
        <div id="preset-row">
            <div class="btn-mini" onclick="window.setPreset('nebula')"><i>✦</i>星云</div>
            <div class="btn-mini" onclick="window.setPreset('fireworks')"><i>✺</i>烟花</div>
            <div class="btn-mini" onclick="window.setPreset('saturn')"><i>🪐</i>土星</div>
            <div class="btn-mini" onclick="window.setPreset('flower')"><i>✿</i>花朵</div>
        </div>
        <div id="slider-row">
            <input type="color" id="baseColor" value="#00f2ff">
            <input type="range" id="densitySlider" min="5000" max="55000" value="25000">
            <span style="flex-shrink:0;">密度</span>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';

let scene, camera, renderer, composer, material, particles;
let handState = { open: 1.0, x: 0, y: 0, active: false };
let currentPreset = 'nebula';

// --- A. 初始化 ---
async function startApp() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('webcam').srcObject = stream;
        await document.getElementById('webcam').play();
        initHandAI();
        initThree();
        document.getElementById('overlay').style.display = 'none';
    } catch (e) { alert("摄像头授权失败"); }
}

// --- B. AI 追踪 ---
function initHandAI() {
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
    hands.onResults(res => {
        if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
            const m = res.multiHandLandmarks[0];
            const d = Math.hypot(m[8].x - m[0].x, m[8].y - m[0].y);
            handState.open = d * 3.8;
            handState.x = (m[9].x - 0.5) * 16;
            handState.y = (0.5 - m[9].y) * 16;
            handState.active = true;
        } else { handState.active = false; }
    });
    const cam = new Camera(document.getElementById('webcam'), {
        onFrame: async () => { await hands.send({ image: document.getElementById('webcam') }); },
        width: 640, height: 480
    });
    cam.start();
}

// --- C. 3D 渲染 ---
function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 12;

    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('container').appendChild(renderer.domElement);

    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    createParticles(25000);
    animate();
}

function createParticles(count) {
    if (particles) { scene.remove(particles); particles.geometry.dispose(); }
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const rnd = new Float32Array(count);
    for(let i=0; i<count; i++) rnd[i] = Math.random();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('random', new THREE.BufferAttribute(rnd, 1));

    if (!material) {
        material = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0x00f2ff) }, uExpand: { value: 1.0 } },
            vertexShader: `
                uniform float uTime; uniform float uExpand; varying vec3 vCol; attribute float random;
                void main() {
                    vec3 p = position * uExpand;
                    float r = uTime * 0.2 + random * 6.28;
                    p.x += cos(r) * 0.15; p.y += sin(r) * 0.15;
                    vCol = mix(vec3(0.1, 0.8, 1.0), vec3(0.9, 0.1, 0.8), sin(uTime + p.x)*0.5+0.5);
                    vec4 mvp = modelViewMatrix * vec4(p, 1.0);
                    gl_PointSize = (8.0 + random * 15.0) * (6.0 / -mvp.z);
                    gl_Position = projectionMatrix * mvp;
                }
            `,
            fragmentShader: `
                varying vec3 vCol; uniform vec3 uColor;
                void main() {
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if(d > 0.5) discard;
                    gl_FragColor = vec4(vCol * uColor, 1.0 - d*2.0);
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });
    }

    particles = new THREE.Points(geo, material);
    scene.add(particles);
    window.setPreset(currentPreset);
}

window.setPreset = function(type) {
    currentPreset = type;
    if(!particles) return;
    const attr = particles.geometry.attributes.position;
    for(let i=0; i<attr.count; i++) {
        let x, y, z;
        if(type === 'nebula') { x=(Math.random()-0.5)*15; y=(Math.random()-0.5)*15; z=(Math.random()-0.5)*15; }
        else if(type === 'fireworks') {
            const t=Math.random()*Math.PI*2, p=Math.acos(Math.random()*2-1), r=Math.pow(Math.random(),2)*20;
            x=r*Math.sin(p)*Math.cos(t); y=r*Math.sin(p)*Math.sin(t); z=r*Math.cos(p);
        }
        else if(type === 'saturn') {
            if(i<attr.count*0.45) {
                const r=4*Math.sqrt(Math.random()), t=Math.random()*Math.PI*2, p=Math.acos(Math.random()*2-1);
                x=r*Math.sin(p)*Math.cos(t); y=r*Math.sin(p)*Math.sin(t); z=r*Math.cos(p);
            } else {
                const r=7+Math.random()*3.5, t=Math.random()*Math.PI*2;
                x=r*Math.cos(t); y=(Math.random()-0.5)*0.3; z=r*Math.sin(t);
            }
        }
        else if(type === 'flower') {
            const a=i*0.18, r=0.5*Math.sqrt(a), petal=Math.sin(a*0.8)*2.8;
            x=(r+petal)*Math.cos(a); y=(r+petal)*Math.sin(a); z=Math.sin(a*0.4)*2.0;
        }
        attr.setXYZ(i, x, y, z);
    }
    attr.needsUpdate = true;
};

function animate() {
    requestAnimationFrame(animate);
    if(material && composer) {
        material.uniforms.uTime.value = performance.now() * 0.001;
        material.uniforms.uExpand.value = THREE.MathUtils.lerp(material.uniforms.uExpand.value, handState.open, 0.1);
        particles.rotation.y += 0.003;
        if(handState.active) {
            particles.rotation.x = THREE.MathUtils.lerp(particles.rotation.x, handState.y * 0.12, 0.1);
            particles.rotation.z = THREE.MathUtils.lerp(particles.rotation.z, -handState.x * 0.12, 0.1);
        }
        composer.render();
    }
}

document.getElementById('start-btn').onclick = startApp;
document.getElementById('baseColor').oninput = (e) => material.uniforms.uColor.value.set(e.target.value);
document.getElementById('densitySlider').oninput = (e) => createParticles(parseInt(e.target.value));

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
};
</script>
</body>
</html>
